name: Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 2"

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JOLPICA_BASE_URL: ${{ secrets.JOLPICA_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install data dependencies
        run: python -m pip install -r data/requirements.txt

      - name: Fetch reference data
        run: python data/fetch_reference_data.py --start-season 2024

      - name: Normalize curated outputs
        run: python data/normalize_results.py

      - name: Load Supabase/Postgres
        if: env.DATABASE_URL != ''
        run: python data/load_supabase.py

      - name: Supabase load skipped
        if: env.DATABASE_URL == ''
        run: |
          echo "DATABASE_URL secret is not configured."
          echo "Skipping Supabase load; fetched/normalized data remains a local workflow artifact only."
