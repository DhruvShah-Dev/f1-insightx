name: Race Week Session Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * 5,6,0"
    - cron: "0 10 * * 1"

permissions:
  contents: read

concurrency:
  group: race-week-session-refresh
  cancel-in-progress: false

jobs:
  refresh-sessions:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JOLPICA_BASE_URL: ${{ secrets.JOLPICA_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Check active race-week window
        id: gate
        run: python data/race_week_refresh_gate.py

      - name: Race-week refresh skipped
        if: steps.gate.outputs.refresh != 'true'
        run: echo "No active race-week window; skipping data refresh."

      - name: Install data dependencies
        if: steps.gate.outputs.refresh == 'true'
        run: python -m pip install -c data/constraints.txt -r data/requirements.txt

      - name: Audit Python dependencies
        if: steps.gate.outputs.refresh == 'true'
        run: |
          python -m pip install pip-audit
          python -m pip_audit --progress-spinner off

      - name: Refresh completed race-week sessions
        if: steps.gate.outputs.refresh == 'true'
        run: python data/refresh_current_race_week_sessions.py --sessions FP1 FP2 FP3 Q SQ S R --retry-failed --completion-buffer-minutes 30

      - name: Monday post-race reference catch-up
        if: steps.gate.outputs.post_race_catchup == 'true'
        run: |
          python data/fetch_reference_data.py --start-season 2024
          python data/normalize_results.py
          python data/build_product_views.py
          python data/build_race_week_layers.py
          python data/build_race_analysis_views.py
          python build_product_manifest.py
          python build_season_state.py

      - name: Validate season state
        if: steps.gate.outputs.refresh == 'true'
        run: python validate_season_state.py

      - name: Validate post-race product outputs
        if: steps.gate.outputs.post_race_catchup == 'true'
        run: |
          python validate_race_analysis_views.py
          python validate_product_manifest.py

      - name: Summarize product manifest
        if: steps.gate.outputs.refresh == 'true'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/reports/product_manifest.json")
          if not path.exists():
              raise SystemExit("data/reports/product_manifest.json was not generated.")

          manifest = json.loads(path.read_text(encoding="utf-8"))
          surfaces = manifest.get("surfaces", {})
          race_week = surfaces.get("race_week", {}) if isinstance(surfaces, dict) else {}
          season_state = surfaces.get("season_state", {}) if isinstance(surfaces, dict) else {}
          print(json.dumps({
              "overall_status": manifest.get("overall_status"),
              "race_week_status": race_week.get("validation_status"),
              "season_state_status": season_state.get("validation_status"),
              "note": "Full product-manifest validation is a release gate; this scheduled workflow only refreshes Race Week session data.",
          }, indent=2))
          PY

      - name: Load Supabase/Postgres
        if: steps.gate.outputs.refresh == 'true' && env.DATABASE_URL != ''
        run: python data/load_supabase.py

      - name: Supabase load skipped
        if: steps.gate.outputs.refresh == 'true' && env.DATABASE_URL == ''
        run: |
          echo "DATABASE_URL secret is not configured."
          echo "Race Week session refresh completed locally in the workflow only."
